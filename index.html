<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado Saúde — SENAC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div>
            <h1>Almoxarifado Saúde</h1>
            <p>SENAC — Zona Norte</p>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="card-header">Cadastrar material</div>
            <div class="card-body">

                <div class="form-row">
                    <div class="form-group full">
                        <label for="input-nome">Nome do material</label>
                        <input type="text" id="input-nome" placeholder="Ex: Luvas de procedimento">
                    </div>

                    <div class="form-group">
                        <label for="input-quantidade">Quantidade</label>
                        <input type="number" id="input-quantidade" placeholder="0" min="0">
                    </div>

                    <div class="form-group">
                        <label for="input-unidade">Unidade</label>
                        <select id="input-unidade">
                            <option value="">Selecione…</option>
                            <option>Unidade</option>
                            <option>Caixa (com 100)</option>
                            <option>Caixa (com 50)</option>
                            <option>Pacote (com 10)</option>
                            <option>Pacote</option>
                            <option>Rolo</option>
                            <option>Litro</option>
                            <option>Frasco</option>
                        </select>
                    </div>
                </div>

                <button id="btn-cadastrar">+ Cadastrar</button>
                <div id="mensagem"></div>

            </div>
        </div>
    </main>

</body>

</html>
