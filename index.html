<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado Saúde — SENAC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div>
            <h1>Almoxarifado Saúde</h1>
            <p>SENAC - Zona Norte</p>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="card-header">Cadastrar material</div>
            <div class="card-body">

                <div class="form-row">
                    <div class="form-group full">
                        <label for="input-nome">Nome do material</label>
                        <input type="text" id="input-nome" placeholder="Ex: Luvas de procedimento">
                    </div>

                    <div class="form-group">
                        <label for="input-quantidade">Quantidade</label>
                        <input type="number" id="input-quantidade" placeholder="0" min="0">
                    </div>

                    <div class="form-group">
                        <label for="input-unidade">Unidade</label>
                        <select id="input-unidade">
                            <option value="">Selecione…</option>
                            <option>Unidade</option>
                            <option>Caixa (com 100)</option>
                            <option>Caixa (com 50)</option>
                            <option>Pacote (com 10)</option>
                            <option>Pacote</option>
                            <option>Rolo</option>
                            <option>Litro</option>
                            <option>Frasco</option>
                        </select>
                    </div>
                </div>

                <button id="btn-cadastrar">+ Cadastrar</button>
                <div id="mensagem"></div>

            </div>
        </div>

        <div class="card">
            <div class="card-header">Materiais em estoque</div>
            <table>
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Quantidade</th>
                        <th>Unidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-materiais">
                    <tr>
                        <td colspan="4" class="empty">Nenhum material cadastrado ainda.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <footer>
        <p>Projeto desenvolvido para o curso técnico de Enfermagem - SENAC Zona Norte</p>
        <p>Desenvolvidor por <a href="https://www.linkedin.com/in/gabriel-oliveira-nogueira-723ab4286">Gabriel Oliveira</a></p>
    </footer>
    <script src="main.js"></script>
</body>

</html>
